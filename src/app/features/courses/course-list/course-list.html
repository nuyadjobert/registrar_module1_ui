<div class="page-header">
  <h2>Courses</h2>
  <button mat-raised-button color="primary" (click)="openAddDialog()">
    <mat-icon>add</mat-icon> Add Course
  </button>
</div>

@if (errorMessage) {
  <div class="error-message">{{ errorMessage }}</div>
}

@if (loading) {
  <div class="loading-wrapper">
    <mat-spinner diameter="40"></mat-spinner>
  </div>
} @else {
  <table mat-table [dataSource]="courses" class="mat-elevation-z2 full-width">

    <ng-container matColumnDef="course_code">
      <th mat-header-cell *matHeaderCellDef>Code</th>
      <td mat-cell *matCellDef="let course">{{ course.course_code }}</td>
    </ng-container>

    <ng-container matColumnDef="course_name">
      <th mat-header-cell *matHeaderCellDef>Course Name</th>
      <td mat-cell *matCellDef="let course">{{ course.course_name }}</td>
    </ng-container>

    <ng-container matColumnDef="units">
      <th mat-header-cell *matHeaderCellDef>Units</th>
      <td mat-cell *matCellDef="let course">{{ course.units }}</td>
    </ng-container>

    <ng-container matColumnDef="department">
      <th mat-header-cell *matHeaderCellDef>Department</th>
      <td mat-cell *matCellDef="let course">{{ course.department }}</td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let course">
        <button mat-icon-button color="primary" (click)="openEditDialog(course)">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn" (click)="deleteCourse(course.id)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

  </table>
}
