<div class="page-header">
  <h2>Enrollments</h2>
</div>

@if (errorMessage) {
  <div class="error-message">{{ errorMessage }}</div>
}

@if (loading) {
  <div class="loading-wrapper">
    <mat-spinner diameter="40"></mat-spinner>
  </div>
} @else {
  <table mat-table [dataSource]="enrollments" class="mat-elevation-z2 full-width">

    <ng-container matColumnDef="student_id">
      <th mat-header-cell *matHeaderCellDef>Student ID</th>
      <td mat-cell *matCellDef="let item">{{ item.student_id }}</td>
    </ng-container>

    <ng-container matColumnDef="section_id">
      <th mat-header-cell *matHeaderCellDef>Section ID</th>
      <td mat-cell *matCellDef="let item">{{ item.section_id }}</td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let item">
        <mat-chip
          [color]="item.status === 'approved' ? 'primary' : item.status === 'rejected' ? 'warn' : 'accent'"
          highlighted>
          {{ item.status }}
        </mat-chip>
      </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let item">
        @if (item.status === 'pending') {
          <button mat-raised-button color="primary" (click)="approve(item.id)">
            <mat-icon>check</mat-icon> Approve
          </button>
          <button mat-raised-button color="warn" class="ml-8" (click)="reject(item.id)">
            <mat-icon>close</mat-icon> Reject
          </button>
        } @else {
          <span class="status-text">{{ item.status | titlecase }}</span>
        }
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

  </table>
}
