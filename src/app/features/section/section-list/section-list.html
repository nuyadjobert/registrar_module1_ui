<div class="page-header">
  <h2>Sections</h2>
  <button mat-raised-button color="primary" (click)="openAddDialog()">
    <mat-icon>add</mat-icon> Add Section
  </button>
</div>

@if (errorMessage) {
  <div class="error-message">{{ errorMessage }}</div>
}

@if (loading) {
  <div class="loading-wrapper">
    <mat-spinner diameter="40"></mat-spinner>
  </div>
} @else {
  <table mat-table [dataSource]="sections" class="mat-elevation-z2 full-width">

    <ng-container matColumnDef="section_name">
      <th mat-header-cell *matHeaderCellDef>Section Name</th>
      <td mat-cell *matCellDef="let item">{{ item.section_name }}</td>
    </ng-container>

    <ng-container matColumnDef="subject_id">
      <th mat-header-cell *matHeaderCellDef>Subject ID</th>
      <td mat-cell *matCellDef="let item">{{ item.subject_id }}</td>
    </ng-container>

    <ng-container matColumnDef="capacity">
      <th mat-header-cell *matHeaderCellDef>Capacity</th>
      <td mat-cell *matCellDef="let item">{{ item.capacity }}</td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let item">
        <button mat-icon-button color="primary" (click)="openEditDialog(item)">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn" (click)="deleteSection(item.id)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

  </table>
}
