<mat-sidenav-container class="cyber-layout-container">
  <mat-sidenav mode="side" opened class="cyber-sidenav">
    <div class="school-brand">
      <div class="brand-logo">
        <mat-icon>school</mat-icon>
      </div>
      <div class="brand-text">
        <h3>SMS Registrar</h3>
        <p>SYSTEM STATUS: OPERATIONAL</p>
      </div>
    </div>

    <mat-nav-list class="cyber-nav-list">
      @for (item of navItems; track item.route) {
        <a mat-list-item
           [routerLink]="item.route"
           routerLinkActive="active-link"
           class="nav-item">
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span matListItemTitle>{{ item.label }}</span>
        </a>
      }
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content class="cyber-content">
    <mat-toolbar class="cyber-toolbar">
      <div class="toolbar-title">
        <span class="glitch-text">REGISTRAR DASHBOARD</span>
      </div>
      
      <span class="toolbar-spacer"></span>
      
      <div class="user-info-badge">
        <mat-icon>admin_panel_settings</mat-icon>
        <span>AUTH_LEVEL: ADMIN</span>
      </div>

      <button mat-icon-button (click)="logout()" title="Terminate Session" class="logout-btn">
        <mat-icon>power_settings_new</mat-icon>
      </button>
    </mat-toolbar>

    <div class="router-container">
      <router-outlet />
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
